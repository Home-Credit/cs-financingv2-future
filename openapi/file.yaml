info:
  title: Home Credit - Partner API - ORDER - Future version
  version: ""
  description: >-
    API documentation for Home Credit API for partners.


    > Version of documentation: `3.2.1` (02/2024)


    In case of any question, please contact our integration department  (integrace_eshop@homecredit.cz).


    | Version        | Release | Release date | News |

    | ---            | ---     | ---          | ---  |

    | 3.2.1 (02/2024) | CS113    | 13.2.2024  | Two new resources were published: [Cancel Application](#reference/application-resources/cancel-application) and [Get Application Detail](/#reference/application-resources/get-application-detail) |

    | 3.1.1 (01/2024) | CS112    | 17.1.2024  | New version of API |


    > **IMPORTANT NOTE:** Resource calls made from **Slovakia** MUST use appropriate dedicated `.sk` endpoints. E.g. `https://api.homecredit.sk/financning/v3/applications`


    ## Getting started


    This online document describes Home Credit API for partners - the means for partners through which they can offer their customers the benefits of one of Home Credit's payment methods or products.


    Described services aim to allow customers the smooth running through the process of an online purchase or loan arrangement. The services that allow achieving this goal are divided into the following groups:


    | Group of services                                           | Purpose                                                                                                                                                      |

    | ---                                                         | ---                                                                                                                                                          |

    | [Security](#reference/security)                             | Security rules and principles                                                                                                                                |

    | [Application resources](#reference/application-resources)   | Resources that allows processing of *application* during its whole life cycle                                                                                |

    | [Merchantsite resources](#reference/merchantsite-resources) | Resources that should be developed and exposed by a partner to allow HC asynchronously inform it about important changes regarding particular *applications* |


    ### Basic implementation


    The basic and minimum way how to implement HCO API is to at least implement:

    1. [Login](#reference/security/login-partner)
        - Partner must be authorized to be able to access the most resources
    1. [Create application](#reference/application-resources/create-application)
        - Partner calls this resource to start the loan approval process by creating an `application`. `Application` itself and its ID are essential for successful process completion.
    1. Redirect handlers.
        - Special URLs for customers that shows payment success or rejection (more info [here](#introduction/getting-started/parameters-added-to-your-return-urls)).
    1. [Application notification](#reference/merchantsite-resources/application-notification)
        - This endpoint has to be exposed on your side to allow HC back-end to asynchronously notify you about the important changes regarding particular applications.
    1. [Mark order items as shipped/delivered](#reference/application-resources/mark-order-as-shipped)
        - Home Credit does not start the process of financial compensation unless the `order` is marked as `SHIPPED` or `DELIVERED` .

    <!-- diagram minimální implementace -->


    <!-- stavový diagram žádosti / objednávky -->


    It is necessary to fill in all attributes marked as 'required' in the request. Filling optional parameters will result in a better application approval rate. Partner should always consider filling as many attributes as possible.


    ## Documentation principles


    - attributes in request/response object are optional unless stated otherwise (`required` flag under attribute name)


    - a required attribute in an optional object means, that if an optional object is specified, it must contain the required attribute.


    - all values in request/response attributes are just examples, except for enum values - these are the only possible values for the given attribute.


    - documentation adheres to [semantic versioning](https://semver.org/spec/v2.0.0.html), which makes a distinction between *major*, *minor*, and *patch* versions.


    ### Naming conventions


    - we use camelCase for all object and attribute names


    - we use CAPITAL_UNDERSCORE for enum values


    - we use plural in resource names


    ### Key words used in this document (RFC 2119)


    The key words "MUST", "MUST NOT", "REQUIRED", "SHALL", "SHALL NOT", "SHOULD", "SHOULD NOT", "RECOMMENDED",  "MAY", and "OPTIONAL" in this document are to be interpreted as described in [RFC 2119](https://www.ietf.org/rfc/rfc2119.txt).


    ## Home Credit REST API principles


    ### Request restrictions


    Please, keep in mind following restrictions regarding requests:


    - Maximum request size is **10 MB**.


    - Maximum size of accepted single file is **500 kB**.


    - Here is the list of supported files:


    | MIME type                                                                 | Example(s)                 |

    | ---                                                                       | ---                        |

    | application/pdf                                                           | *.pdf                      |

    | application/vnd.openxmlformats-officedocument.spreadsheetml.sheet         | *.xlsx                     |

    | application/vnd.openxmlformats-officedocument.wordprocessingml.document   | *.docx                     |

    | application/vnd.openxmlformats-officedocument.presentationml.presentation | *.pptx                     |

    | application/vnd.ms-excel                                                  | *.xls, *.xlt, *.xla        |

    | application/msword                                                        | *.doc, *.dot               |

    | application/vnd.ms-powerpoint                                             | *.ppt, *.pot, *.pps, *.ppa |

    | plain/text                                                                | *.csv, *.txt               |

    | image/jpeg                                                                | *.jpg, *.jpeg              |

    | image/png                                                                 | *.png                      |

    | image/gif                                                                 | *.gif                      |


    ### API calls limits


    When partner reaches API calls limit (partner calls the API more times than is partner's quota), he receives HTTP error 429. To inform partner about limits we use following response headers:


    - `X-Rate-Limit-Limit` - The number of allowed requests in the current period


    - `X-Rate-Limit-Remaining` - The number of remaining requests in the current period


    - `X-Rate-Limit-Reset` - The number of seconds left in the current period


    ### Versioning


    We use API version in URL (e.g. `https://api.homecredit.cz/financing/v3/applications`). *Minor* changes and *patches* (see below) that don't break backwards compatibility do NOT increase API version, e.g. they MAY happen without prior notice and your application should be ready to handle them.


    *Minor* changes include:


    - adding new resource


    - adding new optional header/URL parameter or optional body attribute to request


    - adding new attribute to response body


    - adding new error codes and messages, provided that error structure is the same


    ### Response encoding


    Unless stated otherwise, all responses are sent as `Content-Type: application/json; charset=utf-8`


    ### HTTP status codes


    We use following status codes throughout the API, except for OAuth flow when response codes are prescribed in RFC


    - 200 `OK` - request was successful


    - 201 `Created` - request was successful and resource was created


    - 202 `Accepted` - request has been accepted for processing, but the processing has not been completed


    - 204 `No Content` - we accepted partner's request but there is nothing to return (e.g. response is empty)


    - 400 `Bad Request` - syntax error, e.g. request is missing required parameters/attributes or parameter values are of incorrect type


    - 401 `Unauthorized` - partner is not authorized


    - 403 `Forbidden` - access denied (e.g. user / application is not allowed to use the resource)


    - 404 `Not Found` - resource could not be found


    - 405 `Method Not Allowed` - specified method is not allowed for resource


    - 422 `Unprocessable Entity` -  business (semantic) errors. Request is well-formed, but cannot be processed (e.g. payment due date is in past). Errors are specified in response body (see below)


    - 429 `Too Many Requests` - partner exceeded the rate limit (see section [API calls limit](#introduction/api-calls-limits) above)


    - 500 `Internal Server Error` - something went wrong on our side


    - 503 `Service Unavailable` - there is planned service outage


    ### Error handling


    Besides HTTP status codes, which are the main indication if something goes wrong, we also use `errors` object to report more details about errors.


    Errors object example:


    ```javascript

    {
        ...

        errors: [
            {
                "code": "ERR_100",
                "message": "Invalid contract number",
                "severity": "ERROR",
                "attribute": "partyAccount.accountNumber",          // optional
                "ticketId": "UAT1:AMS:20160516-091658.450:45e4" // optional
            },
            {
                "code": 352,
                "message": "Insufficiend funds for payment order realization",
                "severity": "WARN"
            },
            {
                "code": 523,
                "message": "This order will trigger currency exchange operation",
                "severity": "INFO"
            }
        ]
    }

    ```


    Error object attributes

    | Attribute name | Description                                                     |

    | ---            | ---                                                             |

    | code           | unique error code                                               |

    | message        | human readable error description (non-localized)                |

    | severity       | error severity (see below)                   |

    | attribute      | json path of request attribute that caused the error (optional) |

    | ticketId       | internal ticket ID, used for error backtracking                 |


    There are 3 levels of error severity:


    - `ERROR` - critical error, execution cannot continue. This MUST be indicated also by appropriate HTTP status code (e.g. `422 Unprocessable Entity`)


    - `WARN` - non-critical error, execution can continue but further user interaction is advisable (for request to proceed, partner MUST specify this error code in `override` request attribute). This MIGHT be indicated also by appropriate HTTP status code.


    - `INFO` - information only, execution can continue without user interaction.


    #### Errors overview


    | Status code | Code                  | Explanation                                                                     | Message                                                                                                        |

    | ---         | ---                   | ---                                                                             | ---                                                                                                            |

    | 400         | INVALID_REQUEST       | Request was not well formatted (malformed request syntax, size too large, etc.) | (*Various messages possible*) e.g. Unsupported combination of application status and order status              |

    | 404         | OBJECT_NOT_FOUND      | The requested resource could not be found                                       | (*Various messages possible*) e.g. Specified object was not found                                              |

    | 422         | NOT_ALLOWED           | Operation is not allowed (internal reason)                                      | (*Various messages possible*) e.g. Not allowed (other reason)                                                  |

    | 500         | INTERNAL_SERVER_ERROR | Unexpected condition was encountered and no more specific message is suitable   | (*Various messages possible*) e.g. Failed to parse given JSON                                                  |


    ### Formats


    - **date** and **time** uses [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) formatting, e.g.:
      - date is represented as `YYYY-mm-dd`. Timezone (local) is added when necessary.
      - time is represented as `Thh:mm:ss`. Timezone is added when necessary. Time with arbitrary number of digits respresenting miliseconds is also accepted (when [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format criteria is met) but the time without miliseconds is always returned.
      - day of week is represented as number 1..7, with 1 being Monday
      - week no. 1 is the week with the year's first Thursday in it

    - **phone numbers** uses international format starting with '+' and including country code (example of valid number: `+420739111222`)


    - **numbers format** number format is defined by [JSON standard](http://www.json.org), e.g. decimals are separated by `.`


    - **money format** uses [ISO 4217](https://en.wikipedia.org/wiki/ISO_4217) formatting (in minor units, e.g.: 12590 in minor units represents 125,90 CZK/EUR)


    ## Parameters added to return URLs


    - During redirection of the customer from Home Credit's front-end back to partner's website (to one of the provided URLs - `approvedRedirectUrl`, `rejectedRedirectUrl`) there are some potentially useful information about a customer's outcome in Home Credit's front-end added:


    - `applicationId` (string) - HCO application identifier


    - `applicationStatus` (enum) – Application status


    - `orderNumber` (string) - E-shop's internal order number provided within API call of [Create application](#reference/application-resources/create-application) (if available)


    - `orderStatus` (enum) - Order status (if available)


    - `cashStatus` (enum) - Cash loan status (if available)


    - `withdrawal` (boolean) – True when the customer's purchase is financed directly from his already existing revolving loan; false when a new contract is being created (if available)


    - `downPayment` (number) – Value of down payment, usually set to 0 (minor units format is used - 100000 represents 1000, [ISO 4217](https://en.wikipedia.org/wiki/ISO_4217))


    - `checkSum` (string) – hashed message


    - e.g. `http://youreshop.cz?&applicationId=123e4567-e89b-12d3-a456-426655440000&applicationStatus=CONFIRMED&orderNumber=018884&orderStatus=TO_SHIP&downPayment=100000&checkSum=443E150D3406F6A8DC62C1DB224AFDD84FA9907071BB1AD9B2C7701031793662191501B26AADF3A31361341EA176C80B23D8A9A5E5B5219538289945FE0C20A7`
paths:
  /authentication/v1/partner:
    post:
      responses:
        "200":
          description: Partner acces token issued
          headers: {}
          content:
            application/json; charset=utf-8:
              schema:
                $ref: "#/components/schemas/PartnerLoginResult"
              examples:
                response:
                  value:
                    accessToken: TokenForPartnerTokenForPartnerTokenForPartnerTokenForPartner
                    expiresIn: 7200
                    tokentype: bearer
        "400":
          description: Unable to authenticate partner
          headers: {}
          content:
            application/json; charset=utf-8:
              schema:
                $ref: "#/components/schemas/Errors"
              examples:
                response:
                  value:
                    errors:
                      - code: BAD_REQUEST
                        message: Bad request
                        severity: ERROR
                        attribute: customer.addresses[1].streetNumber
                        ticketId: UAT1:AMS:20160516-091658.450:45e4
      summary: Login partner
      operationId: Login partner
      description: Partner authenticate himself and obtain acces token
      tags:
        - Security
      requestBody:
        content:
          application/json; charset=utf-8:
            schema:
              type: object
              properties:
                username:
                  type: string
                  description: Partner username
                password:
                  type: string
                  description: Partner secret password
              required:
                - username
                - password
              example:
                username: eShop
                password: eShopSecretPassword
  /financing/v3/applications:
    post:
      responses:
        "200":
          description: Application was created in the past (nothing changed)
          headers: {}
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/ApplicationBase"
              examples:
                response:
                  value:
                    id: 123e4567-e89b-12d3-a456-426655440000
                    status: CREATED
                    workflowSteps:
                      - code: REDIRECT
                        priority: 1
                        mandatory: true
                        redirect:
                          gatewayRedirectUrl: https://nasplatky.homecredit.cz
        "201":
          description: Application was created
          headers: {}
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/ApplicationBase"
              examples:
                response:
                  value:
                    id: 123e4567-e89b-12d3-a456-426655440000
                    status: CREATED
                    workflowSteps:
                      - code: REDIRECT
                        priority: 1
                        mandatory: true
                        redirect:
                          gatewayRedirectUrl: https://nasplatky.homecredit.cz
        "400":
          description: There was an error processing request - invalid financedSubject.type
          headers: {}
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/Errors"
              examples:
                response:
                  value:
                    errors:
                      - code: BAD_REQUEST
                        message: Bad request
                        severity: ERROR
                        attribute: customer.addresses[1].streetNumber
                        ticketId: UAT1:AMS:20160516-091658.450:45e4
      summary: Create application
      operationId: Create application
      description: >-
        The elementary flow starts when the customer is interested in some of
        Home Credit's product.



        Use `/financing/v3/applications` resource with properly filled request that contains at least following data

        - Type of customer (MUST be defined)

        - Customer's personal data (MAY be ommited for `ONLINE` process)

        - Order (or other product) details
          - Type of order (`STANDARD` or `BROKERED`)
          - Total Price (including VAT)
          - Order items (array, at least one item is required for `STANDARD` order type)
            - Order item name
            - Total price (all pieces, including VAT)
          - Name of the original e-shop the purchase was made in (for `BROKERED` order type)
        - Context information necessary for the continuation and completion of the process
          - Channel type (`ONLINE`)
          - Channel data

        If the request was successfully processed, partner receives HTTP status code 201 and `Application` object with at least following information in the response:

        - Application unique ID

        - Application status



        If the request contained `ApplicationRequest.financedSubject.order.number` and was **recognized as duplication**

        - and previously created `Application` is canceled (`Application.status = CANCELLED` and `Application.financedSubject.order.status = CANCELLED`), new `Application` is created, HTTP status code 201 is returned with `Application` object with information specified above in the response

        - and previously created `Application` is still not in process by customer (without any recorded action by a customer), no new `Application` is created, HTTP status code 200 is returned with `Application` object with information about application created during the first related successful resource call.

        - and previously created `Application` is neither canceled nor new anymore, HTTP status code 422 is returned with error code `DUPLICATE_ORDER_NUMBER`.


        In case of an error, you receive one of the following results:

        | Status code | Code                   | Explanation                                                                     |

        | ---         | ---                    | ---                                                                             |

        | 400         | INVALID_REQUEST        | Request was not well-formatted (malformed request syntax, size too large, etc.) |

        | 422         | UNPROCESSABLE          | Request was well-formed but was unable to be followed due to semantic errors    |

        | 422         | DUPLICATE_ORDER_NUMBER | Creating of Application with duplicated Order number is not allowed             |

        | 500         | INTERNAL_SERVER_ERROR  | Unexpected condition was encountered and no more specific message is suitable   |


        Create a new *application*
      tags:
        - Application resources
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              type: object
              properties:
                customer:
                  type: object
                  properties:
                    type:
                      type: string
                      enum:
                        - PERSON
                        - ENTREPRENEUR
                        - LEGAL_ENTITY
                      description: Customer type
                    person:
                      type: object
                      properties:
                        firstName:
                          type: string
                          description: Customer first (given) name. Name SHOULD follow regular expression
                            `^[A-ZÁ-Ž]'?[- \u00A0a-zA-Zá-žÁ-Ž]*[a-zA-Zá-žÁ-Ž]$`,
                            SHOULD be 2 to 30 characters long and characters
                            SHOULD be in the `ISO 8859-2` character set.
                        lastName:
                          type: string
                          description: Customer last (family) name. Name SHOULD follow regular expression
                            `^[A-ZÁ-Ž]'?[-
                            \u00A0a-zA-Zá-žÁ-Ž]*[a-zA-Zá-žÁ-Ž]$`,SHOULD be 2 to
                            30 characters long and characters SHOULD be in the
                            `ISO 8859-2` character set.
                        fullName:
                          type: string
                          description: Customer full name, including academical degrees and salutation.
                            Attribute `fullName` is parsed (and eventually
                            shortened) into `firstName` and `lastName`;
                            `fullName` is never returned in response. In case
                            all three attributes are provided, `fullName` is
                            discarded. Full name SHOULD be no longer than 100
                            characters and characters SHOULD be in the `ISO
                            8859-2` character set
                        contacts:
                          type: array
                          items:
                            type: object
                            properties:
                              type:
                                type: string
                                enum:
                                  - EMAIL
                                  - MOBILE
                                  - PHONE
                                description: Contact type
                              email:
                                type: object
                                properties:
                                  value:
                                    type: string
                                    description: E-mail address of customer. MUST be valid email according to [RFC
                                      2822](https://tools.ietf.org/html/rfc2822).
                                required:
                                  - value
                                description: Email address of customer. REQUIRED for `EMAIL` Contact type.
                              mobile:
                                type: object
                                properties:
                                  countryCode:
                                    type: string
                                    description: MUST be valid countryCode.
                                  value:
                                    type: string
                                    description: Mobile phone number SHOULD be 9 characters long. The mobile phone
                                      number itself without country code SHOULD
                                      begin with digit `6` or `7` (for CZ) or
                                      with `9x` where `x` is different from `6`
                                      (for SK).
                                required:
                                  - value
                                description: Number of customer's mobile phone. REQUIRED for `MOBILE_PHONE`
                                  Contact type.
                              phone:
                                type: object
                                properties:
                                  countryCode:
                                    type: string
                                    description: MUST be valid countryCode.
                                  value:
                                    type: string
                                    description: Mobile phone number SHOULD be 9 characters long. The mobile phone
                                      number itself without country code SHOULD
                                      begin with digit `6` or `7` (for CZ) or
                                      with `9x` where `x` is different from `6`
                                      (for SK).
                                required:
                                  - value
                                description: Number of customer's landline phone. REQUIRED for `PHONE` Contact
                                  type.
                            required:
                              - type
                          description: Contacts of person.
                        addresses:
                          type: array
                          items:
                            type: object
                            properties:
                              city:
                                type: string
                                description: City. String values longer than 100 characters will be shortened to
                                  100 characters.
                              streetAddress:
                                type: string
                                description: Street/city part. String values longer than 100 characters will be
                                  shortened to 100 characters.
                              streetNumber:
                                type: string
                                description: Street number. String values longer than 50 characters will be
                                  shortened to 50 characters.
                              zip:
                                type: string
                                description: Postal code. String values longer than 10 characters will be
                                  shortened to 10 characters.
                              flags:
                                type: array
                                items:
                                  type: string
                                  enum:
                                    - PERMANENT
                                    - CONTACT
                                description: Types of the address.
                          description: Addresses.
                        identificationNumber:
                          type: string
                          description: Customer's identification number (actually birth number). SHOULD be
                            valid according to the legislation currently in
                            effect. Customer MUST be at least 18 years old.
                        ipAddress:
                          type: string
                          description: IPv4 or IPv6 address of a customer.
                        fingerprintComponents:
                          type: object
                          properties:
                            key:
                              type: string
                              description: Key
                            value:
                              type: string
                              description: Value
                          required:
                            - key
                            - value
                          description: Fingerprints components.
                      description: REQUIRED for `PERSON` Customer type. If known, customer data MAY be
                        included for a smoother approval process for defined
                        type of customer
                    entrepreneur:
                      type: object
                      properties:
                        businessName:
                          type: string
                          description: Name of business company.
                        addresses:
                          type: array
                          items:
                            type: object
                            properties:
                              city:
                                type: string
                                description: City. String values longer than 100 characters will be shortened to
                                  100 characters.
                              streetAddress:
                                type: string
                                description: Street/city part. String values longer than 100 characters will be
                                  shortened to 100 characters.
                              streetNumber:
                                type: string
                                description: Street number. String values longer than 50 characters will be
                                  shortened to 50 characters.
                              zip:
                                type: string
                                description: Postal code. String values longer than 10 characters will be
                                  shortened to 10 characters.
                              flags:
                                type: array
                                items:
                                  type: string
                                  enum:
                                    - PERMANENT
                                    - CONTACT
                                description: Types of the address.
                          description: Addresses.
                        businessIdentificationNumber:
                          type: string
                          description: Company's identification number (known as IČO).
                        ipAddress:
                          type: string
                          description: IPv4 or IPv6 address of a customer.
                        fingerprintComponents:
                          type: object
                          properties:
                            key:
                              type: string
                              description: Key
                            value:
                              type: string
                              description: Value
                          required:
                            - key
                            - value
                          description: Fingerprints components.
                      description: REQUIRED for `ENTREPRENEUR` Customer type. If known, customer data
                        MAY be included for a smoother approval process for
                        defined type of customer
                    legalEntity:
                      type: object
                      properties:
                        businessName:
                          type: string
                          description: Name of business company.
                        addresses:
                          type: array
                          items:
                            type: object
                            properties:
                              city:
                                type: string
                                description: City. String values longer than 100 characters will be shortened to
                                  100 characters.
                              streetAddress:
                                type: string
                                description: Street/city part. String values longer than 100 characters will be
                                  shortened to 100 characters.
                              streetNumber:
                                type: string
                                description: Street number. String values longer than 50 characters will be
                                  shortened to 50 characters.
                              zip:
                                type: string
                                description: Postal code. String values longer than 10 characters will be
                                  shortened to 10 characters.
                              flags:
                                type: array
                                items:
                                  type: string
                                  enum:
                                    - PERMANENT
                                    - CONTACT
                                description: Types of the address.
                          description: Addresses.
                        businessIdentificationNumber:
                          type: string
                          description: Company's identification number (known as IČO).
                        ipAddress:
                          type: string
                          description: IPv4 or IPv6 address of a customer.
                        fingerprintComponents:
                          type: object
                          properties:
                            key:
                              type: string
                              description: Key
                            value:
                              type: string
                              description: Value
                          required:
                            - key
                            - value
                          description: Fingerprints components.
                      description: REQUIRED for `LEGAL_ENTITY` Customer type. If known, customer data
                        MAY be included for a smoother approval process for
                        defined type of customer
                  required:
                    - type
                  description: Customer data. This specification of type of customer is REQUIRED.
                originationContext:
                  type: object
                  properties:
                    channel:
                      type: object
                      properties:
                        type:
                          type: string
                          enum:
                            - ONLINE
                          description: Type of origination channel
                        online:
                          type: object
                          properties:
                            approvedRedirect:
                              type: string
                              description: URL of the partner used for redirection of the customer back to
                                partner website after the application approval.
                                MUST be a valid URL according to [RFC
                                3986](https://tools.ietf.org/html/rfc3986). URL
                                SHOULD contain scheme (for example `https://`)
                                otherwise some browsers will not redirect
                                customer correctly.  MUST NOT be longer than
                                1000 characters.
                            rejectedRedirect:
                              type: string
                              description: URL of the partner used for redirection of the customer back to
                                partner website after application rejection.
                                MUST be valid URL according to [RFC
                                3986](https://tools.ietf.org/html/rfc3986). URL
                                SHOULD contain scheme (for example `https://`)
                                otherwise some browsers will not redirect
                                customer correctly. MUST NOT be longer than 1000
                                characters.
                            notificationEndpoint:
                              type: string
                              description: URL of the partner used as a notification endpoint for notifying
